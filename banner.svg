<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="850" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="50%" stop-color="#050614" />
      <stop offset="100%" stop-color="#0a0c25" />
    </linearGradient>

    <!-- Neon Green Glow Filter -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Blue Glow Filter -->
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.07" />
    </pattern>

    <!-- Stylesheets for animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@700;900&amp;display=swap');

      .title {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: 4px;
      }
      
      .subtitle {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 13px;
        fill: #00ff88;
        letter-spacing: 2px;
        opacity: 0.85;
      }

      .terminal-text {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        fill: #e2e8f0;
      }

      .prompt {
        fill: #00ff88;
        font-weight: bold;
      }

      .keyword {
        fill: #00d4ff;
      }

      .success {
        fill: #00ff88;
      }

      /* Keyframe animations */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes pulse {
        0%, 100% { r: 4px; opacity: 0.6; }
        50% { r: 7px; opacity: 1; }
      }

      @keyframes flow {
        to {
          stroke-dashoffset: -40;
        }
      }

      @keyframes scanline {
        0% { transform: translateY(-300px); }
        100% { transform: translateY(300px); }
      }

      /* Delay sequences for terminal text lines */
      @keyframes reveal {
        to { opacity: 1; }
      }

      .cursor {
        animation: blink 1s infinite;
      }

      .line-1 { opacity: 0; animation: reveal 0.1s forwards; animation-delay: 0.5s; }
      .line-2 { opacity: 0; animation: reveal 0.1s forwards; animation-delay: 1.8s; }
      .line-3 { opacity: 0; animation: reveal 0.1s forwards; animation-delay: 3.0s; }
      .line-4 { opacity: 0; animation: reveal 0.1s forwards; animation-delay: 4.2s; }
      .line-5 { opacity: 0; animation: reveal 0.1s forwards; animation-delay: 5.5s; }

      .network-node {
        animation: float 4s ease-in-out infinite;
      }

      .pulse-node {
        animation: pulse 2s ease-in-out infinite;
      }

      .connection-line {
        stroke-dasharray: 8, 4;
        animation: flow 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Background Layer -->
  <rect width="850" height="300" fill="url(#bgGrad)" rx="12" />
  
  <!-- Cyber Grid -->
  <rect width="850" height="300" fill="url(#grid)" rx="12" />

  <!-- Scanline effect -->
  <rect width="850" height="4" fill="#00ff88" fill-opacity="0.05" style="animation: scanline 8s linear infinite;" />

  <!-- LEFT: Futuristic Terminal (width: 420, height: 220, x: 40, y: 40) -->
  <g transform="translate(40, 40)">
    <!-- Terminal shadow & border -->
    <rect width="420" height="220" rx="8" fill="#020308" stroke="#1e293b" stroke-width="1.5" />
    <rect width="420" height="220" rx="8" fill="none" stroke="#00ff88" stroke-width="1" stroke-opacity="0.2" filter="url(#greenGlow)" />
    
    <!-- Window Header -->
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 412 0 A 8 8 0 0 1 420 8 L 420 30 L 0 30 Z" fill="#0d1117" />
    <circle cx="20" cy="15" r="5" fill="#ef4444" />
    <circle cx="35" cy="15" r="5" fill="#f59e0b" />
    <circle cx="50" cy="15" r="5" fill="#10b981" />
    <text x="210" y="19" font-family="'Fira Code', monospace" font-size="11" fill="#475569" text-anchor="middle">daksh@system-node:~</text>
    <line x1="0" y1="30" x2="420" y2="30" stroke="#1e293b" stroke-width="1" />

    <!-- Terminal Content -->
    <g transform="translate(20, 55)" class="terminal-text">
      <!-- Line 1 -->
      <g class="line-1">
        <text x="0" y="0"><tspan class="prompt">daksh$</tspan> init_agent --profile daksh</text>
      </g>
      
      <!-- Line 2 -->
      <g class="line-2">
        <text x="0" y="25">> Authenticating developer account... <tspan class="success">SUCCESS</tspan></text>
      </g>
      
      <!-- Line 3 -->
      <g class="line-3">
        <text x="0" y="50">> Loading Deep Learning &amp; Cloud stack...</text>
      </g>
      
      <!-- Line 4 -->
      <g class="line-4">
        <text x="12" y="75" fill="#94a3b8">> PyTorch, Docker, Kubernetes, AWS: <tspan class="keyword">ACTIVE</tspan></text>
      </g>
      
      <!-- Line 5 -->
      <g class="line-5">
        <!-- Pulse Status -->
        <circle cx="8" cy="101" r="5" fill="#00ff88" class="pulse-node" filter="url(#greenGlow)" />
        <text x="24" y="105" font-weight="bold" fill="#00ff88">STATUS: SYSTEM RUNNING OPTIMALLY ⚡</text>
      </g>

      <!-- Cursor -->
      <rect x="305" y="-12" width="8" height="15" fill="#00ff88" class="cursor" style="animation-delay: 0s;" />
    </g>
  </g>

  <!-- RIGHT: Branding & Interactive Network Graph (x: 490, y: 40) -->
  <g transform="translate(490, 40)">
    
    <!-- Large Branding Title -->
    <text x="320" y="50" class="title" font-size="28" text-anchor="end" filter="url(#blueGlow)">DAKSH MEHROTRA</text>
    <text x="320" y="78" class="subtitle" text-anchor="end">ML ENGINEER • CLOUD ARCHITECT</text>

    <!-- Interactive Node Graph (Visualizing interconnected skills) -->
    <!-- Nodes and Connections (floating container) -->
    <g class="network-node">
      <!-- Core Node -->
      <circle cx="160" cy="160" r="16" fill="#0a0f24" stroke="#00ff88" stroke-width="3" filter="url(#greenGlow)" />
      <circle cx="160" cy="160" r="6" fill="#00ff88" />
      <text x="160" y="192" font-family="'Orbitron', sans-serif" font-size="10" fill="#00ff88" text-anchor="middle" font-weight="bold">IIT ROORKEE R&amp;D</text>

      <!-- Cloud Node -->
      <circle cx="80" cy="110" r="10" fill="#0a0f24" stroke="#00d4ff" stroke-width="2" filter="url(#blueGlow)" />
      <circle cx="80" cy="110" r="4" fill="#00d4ff" class="pulse-node" />
      <text x="80" y="92" font-family="'Orbitron', sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">AWS CLOUD</text>

      <!-- ML Node -->
      <circle cx="240" cy="110" r="10" fill="#0a0f24" stroke="#00ff88" stroke-width="2" filter="url(#greenGlow)" />
      <circle cx="240" cy="110" r="4" fill="#00ff88" class="pulse-node" />
      <text x="240" y="92" font-family="'Orbitron', sans-serif" font-size="9" fill="#00ff88" text-anchor="middle">PYTORCH / ML</text>

      <!-- DevOps Node -->
      <circle cx="160" cy="80" r="10" fill="#0a0f24" stroke="#a78bfa" stroke-width="2" />
      <circle cx="160" cy="80" r="4" fill="#a78bfa" />
      <text x="160" y="62" font-family="'Orbitron', sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">DEVOPS</text>

      <!-- Connections (glowing lines) -->
      <!-- Cloud to Core -->
      <line x1="88" y1="114" x2="148" y2="152" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6" class="connection-line" />
      <!-- ML to Core -->
      <line x1="232" y1="114" x2="172" y2="152" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.6" class="connection-line" />
      <!-- DevOps to Cloud -->
      <line x1="151" y1="84" x2="89" y2="106" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" />
      <!-- DevOps to ML -->
      <line x1="169" y1="84" x2="231" y2="106" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4" />
      <!-- DevOps to Core -->
      <line x1="160" y1="90" x2="160" y2="144" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5" class="connection-line" />
    </g>
  </g>
</svg>
