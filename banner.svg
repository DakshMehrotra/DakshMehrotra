<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="850" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030308" />
      <stop offset="100%" stop-color="#080914" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.04" />
    </pattern>

    <!-- Stylesheets with safe system fonts -->
    <style>
      .name-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 5px;
        font-size: 26px;
      }
      
      .sub-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #00ff88;
        letter-spacing: 3px;
        opacity: 0.85;
      }

      .mono-text {
        font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 10px;
        fill: #64748b;
        letter-spacing: 1px;
      }

      .system-status {
        fill: #00ff88;
        font-weight: bold;
      }

      /* Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }

      @keyframes pulseNode {
        0%, 100% { r: 3px; opacity: 0.5; }
        50% { r: 5px; opacity: 1; }
      }

      @keyframes dashflow {
        to {
          stroke-dashoffset: -20;
        }
      }

      .animated-graph {
        animation: float 5s ease-in-out infinite;
      }

      .pulse-circle {
        animation: pulseNode 3s ease-in-out infinite;
      }

      .flow-line {
        stroke-dasharray: 5, 5;
        animation: dashflow 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="850" height="220" fill="url(#bgGrad)" rx="8" stroke="#1e293b" stroke-width="1" />
  
  <!-- Subtle Grid -->
  <rect width="850" height="220" fill="url(#grid)" rx="8" />

  <!-- LEFT: Elegant Typography (x: 45, y: 75) -->
  <g transform="translate(45, 75)">
    <!-- Name -->
    <text x="0" y="20" class="name-text">DAKSH MEHROTRA</text>
    
    <!-- Subtitles -->
    <text x="0" y="45" class="sub-text">MACHINE LEARNING • CLOUD ARCHITECT</text>
    
    <!-- Status Line -->
    <g transform="translate(0, 80)" class="mono-text">
      <text x="0" y="0">SYSTEM CONFIG: <tspan class="system-status">R&amp;D INTERN @ IIT ROORKEE</tspan></text>
      <text x="0" y="16">ACTIVE DEPLOYMENTS: AWS CLOUD ARCHITECTURES</text>
    </g>
  </g>

  <!-- RIGHT: Ultra-Clean Abstract Constellation / Grid (x: 580, y: 35) -->
  <g transform="translate(580, 35)" class="animated-graph">
    
    <!-- Connection Paths -->
    <!-- Line 1: Central to Top -->
    <line x1="100" y1="75" x2="100" y2="25" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6" class="flow-line" />
    <!-- Line 2: Central to Left -->
    <line x1="100" y1="75" x2="30" y2="75" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6" class="flow-line" style="animation-delay: -0.5s;" />
    <!-- Line 3: Central to Right -->
    <line x1="100" y1="75" x2="170" y2="75" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.6" class="flow-line" style="animation-delay: -1s;" />
    <!-- Line 4: Central to Bottom -->
    <line x1="100" y1="75" x2="100" y2="125" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4" />
    
    <!-- Diagonal connections -->
    <line x1="30" y1="75" x2="100" y2="25" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3" />
    <line x1="170" y1="75" x2="100" y2="25" stroke="#00ff88" stroke-width="1" stroke-opacity="0.3" />
    <line x1="30" y1="75" x2="100" y2="125" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3" />
    <line x1="170" y1="75" x2="100" y2="125" stroke="#00ff88" stroke-width="1" stroke-opacity="0.3" />

    <!-- Nodes (Geometric points) -->
    <!-- Center Node -->
    <circle cx="100" cy="75" r="8" fill="#030308" stroke="#a78bfa" stroke-width="2" />
    <circle cx="100" cy="75" r="3" fill="#a78bfa" />
    
    <!-- Left Node -->
    <circle cx="30" cy="75" r="6" fill="#030308" stroke="#00d4ff" stroke-width="2" filter="url(#blueGlow)" />
    <circle cx="30" cy="75" r="2.5" fill="#00d4ff" class="pulse-circle" />
    
    <!-- Right Node -->
    <circle cx="170" cy="75" r="6" fill="#030308" stroke="#00ff88" stroke-width="2" filter="url(#greenGlow)" />
    <circle cx="170" cy="75" r="2.5" fill="#00ff88" class="pulse-circle" style="animation-delay: -1.5s;" />

    <!-- Top Node -->
    <circle cx="100" cy="25" r="5" fill="#030308" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="100" cy="25" r="1.5" fill="#ffffff" />
    
    <!-- Bottom Node -->
    <circle cx="100" cy="125" r="5" fill="#030308" stroke="#64748b" stroke-width="1.5" />
    
    <!-- Text overlays on nodes (small system labels) -->
    <text x="100" y="12" font-family="-apple-system, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle" letter-spacing="1">ML</text>
    <text x="30" y="92" font-family="-apple-system, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" letter-spacing="1">CLOUD</text>
    <text x="170" y="92" font-family="-apple-system, sans-serif" font-size="8" fill="#00ff88" text-anchor="middle" letter-spacing="1">R&amp;D</text>
  </g>
</svg>
