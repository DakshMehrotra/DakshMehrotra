<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="850" height="220">
  <defs>
    <!-- Deep Space Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="50%" stop-color="#050614" />
      <stop offset="100%" stop-color="#08091a" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for Waves -->
    <linearGradient id="waveGreenBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>

    <linearGradient id="waveBluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.03" />
    </pattern>

    <!-- Stylesheets with safe system fonts -->
    <style>
      .name-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 6px;
        font-size: 26px;
      }
      
      .sub-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #00ff88;
        letter-spacing: 3px;
      }

      .info-text {
        font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 10px;
        fill: #64748b;
        letter-spacing: 1px;
      }

      .status-active {
        fill: #00ff88;
        font-weight: bold;
      }

      /* CSS Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }

      @keyframes waveFlow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }

      @keyframes pulseNode {
        0%, 100% { r: 3px; opacity: 0.4; }
        50% { r: 5px; opacity: 0.9; }
      }

      .wave-1 {
        stroke-dasharray: 120, 20;
        animation: waveFlow 12s linear infinite;
      }

      .wave-2 {
        stroke-dasharray: 90, 30;
        animation: waveFlow 9s linear infinite;
      }

      .wave-3 {
        stroke-dasharray: 60, 40;
        animation: waveFlow 6s linear infinite;
      }

      .floating-particle {
        animation: float 4s ease-in-out infinite;
      }

      .pulsing-dot {
        animation: pulseNode 2.5s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="850" height="220" fill="url(#bgGrad)" rx="8" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Subtle Grid -->
  <rect width="850" height="220" fill="url(#grid)" rx="8" />

  <!-- LEFT: Elegant Typography (x: 45, y: 75) -->
  <g transform="translate(45, 65)">
    <!-- Name -->
    <text x="0" y="20" class="name-text">DAKSH MEHROTRA</text>
    
    <!-- Subtitle -->
    <text x="0" y="45" class="sub-text">MACHINE LEARNING • CLOUD ARCHITECT</text>
    
    <!-- Thin Elegant Divider Line -->
    <line x1="0" y1="62" x2="320" y2="62" stroke="#1e293b" stroke-width="1" />
    
    <!-- Status Line -->
    <g transform="translate(0, 84)" class="info-text">
      <text x="0" y="0">SYSTEM CONFIG: <tspan class="status-active">R&amp;D INTERN @ IIT ROORKEE</tspan></text>
      <text x="0" y="16">ACTIVE DEPLOYMENTS: AWS CLOUD INFRASTRUCTURES</text>
      <text x="0" y="32">CORE DEVELOPMENT: PYTORCH | KUBERNETES | DEVOPS</text>
    </g>
  </g>

  <!-- RIGHT: Ultra-Clean Flowing Waves & Abstract Tech Art (x: 440 to 800) -->
  <!-- Wave layer 3 (Back / Purple-Blue) -->
  <path d="M 440,110 C 500,60 540,160 600,110 C 660,60 700,160 760,110 C 800,75 820,135 850,110" 
        fill="none" stroke="url(#waveBluePurple)" stroke-width="1.5" stroke-opacity="0.15" class="wave-3" />

  <!-- Wave layer 2 (Middle / Blue-Green) -->
  <path d="M 440,110 C 490,160 530,60 590,110 C 650,160 690,60 750,110 C 790,150 810,70 850,110" 
        fill="none" stroke="url(#waveGreenBlue)" stroke-width="2" stroke-opacity="0.3" class="wave-2" filter="url(#blueGlow)" />

  <!-- Wave layer 1 (Front / Glowing Green) -->
  <path d="M 440,110 C 510,130 550,90 610,110 C 670,130 710,90 770,110 C 810,120 830,100 850,110" 
        fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.6" class="wave-1" filter="url(#greenGlow)" />

  <!-- Flowing data particles / Glowing nodes (Fixed positions relative to wave paths) -->
  <g class="floating-particle">
    <!-- Node 1 -->
    <circle cx="510" cy="120" r="5" fill="#020205" stroke="#00ff88" stroke-width="1.5" />
    <circle cx="510" cy="120" r="2" fill="#00ff88" class="pulsing-dot" />
    
    <!-- Node 2 -->
    <circle cx="610" cy="110" r="5" fill="#020205" stroke="#00d4ff" stroke-width="1.5" />
    <circle cx="610" cy="110" r="2" fill="#00d4ff" class="pulsing-dot" style="animation-delay: -0.8s;" />

    <!-- Node 3 -->
    <circle cx="710" cy="100" r="5" fill="#020205" stroke="#a78bfa" stroke-width="1.5" />
    <circle cx="710" cy="100" r="2" fill="#a78bfa" class="pulsing-dot" style="animation-delay: -1.6s;" />
  </g>
</svg>
