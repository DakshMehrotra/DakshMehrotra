<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 120" width="850" height="120">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="100%" stop-color="#070817" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Style definitions for animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');

      .node-title {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 10px;
        fill: #94a3b8;
        letter-spacing: 1px;
      }

      .node-value {
        font-family: 'Orbitron', -apple-system, sans-serif;
        font-weight: 900;
        font-size: 11px;
        letter-spacing: 1px;
      }

      .green-text { fill: #00ff88; }
      .blue-text { fill: #00d4ff; }
      .purple-text { fill: #c084fc; }

      @keyframes pulseNode {
        0%, 100% { r: 6; opacity: 0.6; }
        50% { r: 10; opacity: 1; }
      }

      @keyframes dashflow {
        to {
          stroke-dashoffset: -30;
        }
      }

      .pulse {
        animation: pulseNode 2s ease-in-out infinite;
      }

      .pipeline-line {
        stroke-dasharray: 6, 4;
        animation: dashflow 1.5s linear infinite;
      }

      .pipeline-node {
        transition: transform 0.3s ease;
      }
    </style>
  </defs>

  <!-- Background Card -->
  <rect width="850" height="120" fill="url(#bgGrad)" rx="8" stroke="#1e293b" stroke-width="1" />

  <!-- Pipeline Tracks (connecting lines) -->
  <!-- Track 1: Data to ML Model -->
  <line x1="120" y1="50" x2="260" y2="50" stroke="#00ff88" stroke-width="2" class="pipeline-line" />
  <!-- Track 2: ML Model to Docker Container -->
  <line x1="300" y1="50" x2="440" y2="50" stroke="#00d4ff" stroke-width="2" class="pipeline-line" style="animation-delay: -0.3s;" />
  <!-- Track 3: Docker to CI/CD -->
  <line x1="480" y1="50" x2="620" y2="50" stroke="#c084fc" stroke-width="2" class="pipeline-line" style="animation-delay: -0.6s;" />
  <!-- Track 4: CI/CD to AWS Cloud -->
  <line x1="660" y1="50" x2="800" y2="50" stroke="#00d4ff" stroke-width="2" class="pipeline-line" style="animation-delay: -0.9s;" />

  <!-- Node 1: DATA PIPELINE (x: 90) -->
  <g class="pipeline-node" transform="translate(90, 50)">
    <circle cx="0" cy="0" r="14" fill="#020205" stroke="#00ff88" stroke-width="2.5" filter="url(#glowGreen)" />
    <circle cx="0" cy="0" r="5" fill="#00ff88" class="pulse" />
    <text x="0" y="-24" class="node-title" text-anchor="middle">STEP 01</text>
    <text x="0" y="30" class="node-value green-text" text-anchor="middle">DATA &amp; CV</text>
  </g>

  <!-- Node 2: MACHINE LEARNING (x: 280) -->
  <g class="pipeline-node" transform="translate(280, 50)">
    <circle cx="0" cy="0" r="14" fill="#020205" stroke="#00ff88" stroke-width="2.5" filter="url(#glowGreen)" />
    <circle cx="0" cy="0" r="5" fill="#00ff88" class="pulse" style="animation-delay: -0.5s;" />
    <text x="0" y="-24" class="node-title" text-anchor="middle">STEP 02</text>
    <text x="0" y="30" class="node-value green-text" text-anchor="middle">ML &amp; RESEARCH</text>
  </g>

  <!-- Node 3: CONTAINERIZATION (x: 460) -->
  <g class="pipeline-node" transform="translate(460, 50)">
    <circle cx="0" cy="0" r="14" fill="#020205" stroke="#00d4ff" stroke-width="2.5" filter="url(#glowBlue)" />
    <circle cx="0" cy="0" r="5" fill="#00d4ff" class="pulse" style="animation-delay: -1s;" />
    <text x="0" y="-24" class="node-title" text-anchor="middle">STEP 03</text>
    <text x="0" y="30" class="node-value blue-text" text-anchor="middle">DOCKER / K8S</text>
  </g>

  <!-- Node 4: CI/CD PIPELINE (x: 640) -->
  <g class="pipeline-node" transform="translate(640, 50)">
    <circle cx="0" cy="0" r="14" fill="#020205" stroke="#c084fc" stroke-width="2.5" filter="url(#glowPurple)" />
    <circle cx="0" cy="0" r="5" fill="#c084fc" class="pulse" style="animation-delay: -1.5s;" />
    <text x="0" y="-24" class="node-title" text-anchor="middle">STEP 04</text>
    <text x="0" y="30" class="node-value purple-text" text-anchor="middle">ACTIONS / CI</text>
  </g>

  <!-- Node 5: AWS CLOUD DEPLOY (x: 820) -->
  <g class="pipeline-node" transform="translate(760, 50)">
    <circle cx="0" cy="0" r="14" fill="#020205" stroke="#00d4ff" stroke-width="2.5" filter="url(#glowBlue)" />
    <circle cx="0" cy="0" r="5" fill="#00d4ff" class="pulse" style="animation-delay: -2s;" />
    <text x="0" y="-24" class="node-title" text-anchor="middle">STEP 05</text>
    <text x="0" y="30" class="node-value blue-text" text-anchor="middle">AWS CLOUD</text>
  </g>
</svg>
